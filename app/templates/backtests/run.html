{% extends "base.html" %}
{% block title %}Run Backtest - Financial Wiki{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <div class="page-kicker">Strategy lab</div>
    <h1 class="page-title">Run 200-day moving average backtest</h1>
    <p class="page-subtitle">Use cleaned Stooq bars already loaded into the database to generate a sample trend-following run.</p>
  </div>
  <div class="page-actions">
    <a class="button secondary" href="{{ url_for('backtests.list_runs') }}">Run history</a>
  </div>
</div>

<section class="section">
  <form method="post">
    <div class="form-grid">
      <label>Symbol<input name="symbol" value="AAPL"></label>
      <label>Benchmark symbol<input name="benchmark_symbol" value="SPY"></label>
    </div>
    <div class="form-actions">
      <button type="submit">Run backtest</button>
    </div>
  </form>
</section>
{% endblock %}
